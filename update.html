<!DOCTYPE html>
<html>
<head>
    <title>⚡ System Update</title>
    <style>
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            padding: 20px;
        }
        .update-box {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 20px;
            color: white;
            max-width: 300px;
            text-align: center;
        }
        .android { font-size: 60px; }
        h2 { color: #4CAF50; margin: 20px 0; }
        .progress {
            width: 100%;
            height: 30px;
            background: #444;
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
        }
        .bar {
            width: 73%;
            height: 100%;
            background: #4CAF50;
            animation: load 2s infinite;
        }
        @keyframes load {
            0% { width: 73%; }
            50% { width: 78%; }
            100% { width: 73%; }
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="update-box">
        <div class="android">🤖</div>
        <h2>System Update Required</h2>
        <p>Critical security patch</p>
        <div class="progress">
            <div class="bar"></div>
        </div>
        <button onclick="update()">UPDATE NOW</button>
        <p style="color:#666;">73% downloaded</p>
    </div>
    <script>
        function update() { alert('Updating...'); }
    </script>
</body>
</html>
