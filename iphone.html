<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎁 Congratulations!</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 300px;
            animation: pop 0.5s;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .icon { font-size: 80px; }
        h1 { color: #333; margin: 20px 0; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            margin: 20px 0;
            cursor: pointer;
        }
        .timer { color: #ff4444; font-size: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📱</div>
        <h1>CONGRATULATIONS!</h1>
        <p>You won an iPhone 15 Pro!</p>
        <div class="timer">⏰ 5:00</div>
        <button onclick="claim()">CLAIM NOW</button>
        <p style="color:#999; font-size:12px;">Only 2 left</p>
    </div>
    <script>
        function claim() { alert('Processing...'); }
    </script>
</body>
</html>
